<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <script src="cp_1.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>User Feedback Form</h1>
    </header>

    <p class="description">We value your feedback! Please fill out the form below to share your thoughts and suggestions with us.</p>

    <form id="user_feedback_form" action="">
        <label for="name">Name: </label>
        <input type="text" id="name" placeholder="Full name" required>
        <br>

        <label for="email">Email: </label>
        <input type="email" id="email" placeholder="hello@example.com" required>
        <br>

        <label for="comments">Comments: </label>
        <textarea type="text" id="comments" placeholder="Your thoughts go here" required></textarea>
        <br>

        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
