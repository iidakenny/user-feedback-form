<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <h1>User Feedback Form</h1>
    </header>

    <p class="description">We value your feedback! Please fill out the form below to share your thoughts and suggestions with us.</p>

<!-- User Feedback Form asking for full name, email, and comments -->

    <form id="user_feedback_form" action="">
        <label for="name">Full Name: </label>
        <input type="text" id="name" placeholder="Samantha Smith" data-tooltip="Please enter your full name">
        <br>

        <label for="email">Email: </label>
        <input type="email" id="email" placeholder="hello@example.com" data-tooltip="Please enter your email, we just want to sell it for more profit" required>
        <br>

        <label for="comment">Comments: </label>
        <textarea type="text" id="comment" autocomplete="off" placeholder="Your thoughts go here" data-tooltip="Please enter your comments" maxlength="500" required></textarea>
        <p id="char_counter"> 0 / 500 characters</p>

        <br>
        <br>

        <button id="submit" type="submit">Submit</button>
    </form>
    

    <script src="cp_1.js"></script>
</body>
</html>
